spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

jwt:
  secret: your-256-bit-secret-key-change-this-in-production-minimum-32-chars
  expiration: 86400000   # 24 hours in milliseconds