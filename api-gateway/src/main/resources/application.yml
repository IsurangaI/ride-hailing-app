spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # Auth service — no JWT required (this is how people log in)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          # No filters here — auth endpoints are public

        # Location service — JWT required
        - id: location-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/locations/**
          filters:
            - JwtAuthFilter

        # Booking service — JWT required
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/rides/**
          filters:
            - JwtAuthFilter

server:
  port: 8080

jwt:
  # Must be the EXACT same secret as in auth-service/application.yml
  secret: ${JWT_SECRET}