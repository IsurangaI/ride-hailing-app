spring:
  application:
    name: booking-service
  datasource:
    url: ${DB_URL}/bookingdb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Wait for all in-sync replicas to acknowledge the write for maximum durability
      acks: all
      properties:
        enable.idempotence: true
server:
  port: 8082
  servlet:
    context-path: /api